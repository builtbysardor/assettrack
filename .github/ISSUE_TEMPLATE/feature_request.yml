name: Feature Request
description: Propose a new feature or improvement for AssetTrack
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem-description
    attributes:
      label: Problem Description
      description: Describe the problem or limitation that this feature would address. What pain point exists today?
      placeholder: "I'm frustrated when... / There is currently no way to..."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe your ideal solution. How should this feature work?
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: Have you explored any workarounds or alternative approaches? Why are they insufficient?
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any mockups, references, related issues, or other context that supports this request.
    validations:
      required: false
