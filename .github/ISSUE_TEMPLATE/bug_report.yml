name: Bug Report
description: Report a bug or unexpected behavior in AssetTrack
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide a clear, step-by-step description of how to trigger the bug.
      placeholder: |
        1. Navigate to '...'
        2. Click on '...'
        3. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or stack traces if available.
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: In which environment did you encounter this bug?
      options:
        - Production
        - Preview
        - Local
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or logs that may help diagnose the issue.
    validations:
      required: false
