version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: assettrack
      POSTGRES_PASSWORD: assettrack_dev
      POSTGRES_DB: assettrack
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assettrack -d assettrack"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
